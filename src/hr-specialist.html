<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recruitment and Training Dashboard | Bee-to-Bee Operations</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@latest"></script></head>
<body class="dashboard-body"><div class="app-shell"><aside class="sidebar" id="sidebar"><div class="brand"><img src="images/b2blogo.png" alt="Bee-to-Bee Logo"><div><strong>Bee-to-Bee</strong><span>Operations</span></div></div><nav class="nav-menu"><button class="nav-item active" data-section="overview"><i data-lucide="layout-dashboard"></i><span>Overview</span></button><button class="nav-item" data-section="applicants"><i data-lucide="users"></i><span>Applicants</span><em>8</em></button><button class="nav-item" data-section="batches"><i data-lucide="calendar-range"></i><span>Training Batches</span></button><button class="nav-item" data-section="certification"><i data-lucide="badge-check"></i><span>Certification</span></button><button class="nav-item" data-section="deployment"><i data-lucide="store"></i><span>Deployment Readiness</span><em class="danger">3</em></button></nav><div class="sidebar-footer"><button class="nav-item" data-section="settings"><i data-lucide="settings"></i><span>Settings</span></button><button class="nav-item logout" id="logoutBtn"><i data-lucide="log-out"></i><span>Log Out</span></button></div></aside>
<main class="main-content"><header class="topbar"><button class="icon-btn mobile-menu" id="menuBtn" aria-label="Open navigation"><i data-lucide="menu"></i></button><div class="search-box"><i data-lucide="search"></i><input id="globalSearch" type="search" aria-label="Search applicants" placeholder="Search applicants, positions, or branches..."></div><div class="topbar-actions"><button class="icon-btn notification-btn" aria-label="Notifications"><i data-lucide="bell"></i><span></span></button><div class="user-profile"><div class="avatar">CN</div><div><strong>Camille Navarro</strong><span>HR Specialist</span></div><i data-lucide="chevron-down"></i></div></div></header><section class="page-content" id="pageContent"></section></main></div>
<div class="modal detail-modal" id="applicantModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="applicantTitle"><div class="modal-card"><div class="detail-header"><button class="modal-close" data-close-modal aria-label="Close applicant"><i data-lucide="x"></i></button><p class="eyebrow" id="applicantId">APPLICANT</p><h2 id="applicantTitle">Applicant profile</h2><div id="applicantHeaderMeta"></div></div><div class="detail-body" id="applicantDetail"></div></div></div>
<div class="modal" id="workflowModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="workflowTitle"><div class="modal-card"><button class="modal-close" data-close-modal aria-label="Close form"><i data-lucide="x"></i></button><div class="modal-icon"><i data-lucide="calendar-check"></i></div><p class="eyebrow" id="workflowEyebrow">HR WORKFLOW</p><h2 id="workflowTitle">Update applicant</h2><p id="workflowDescription"></p><form id="workflowForm"><div id="workflowFields"></div><div class="modal-actions"><button type="button" class="secondary-btn" data-close-modal>Cancel</button><button type="submit" class="primary-btn" id="workflowSubmit">Save</button></div></form></div></div>
<div class="toast" id="toast" role="status" aria-live="polite"><i data-lucide="circle-check"></i><span>Changes saved.</span></div><script src="js/dashboard-utils.js"></script><script src="js/hr-specialist-data.js"></script><script src="js/hr-specialist.js"></script></body></html>
