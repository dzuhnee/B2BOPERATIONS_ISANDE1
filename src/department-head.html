<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Department Approval Dashboard | Bee-to-Bee Operations</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@latest"></script></head>
<body class="dashboard-body"><div class="app-shell"><aside class="sidebar" id="sidebar"><div class="brand"><img src="images/b2blogo.png" alt="Bee-to-Bee Logo"><div><strong>Bee-to-Bee</strong><span>Operations</span></div></div><nav class="nav-menu"><button class="nav-item active" data-section="overview"><i data-lucide="layout-dashboard"></i><span>Overview</span></button><button class="nav-item" data-section="proposals"><i data-lucide="files"></i><span>Assigned Proposals</span><em id="proposalCount">0</em></button><button class="nav-item" data-section="progress"><i data-lucide="git-branch"></i><span>Approval Progress</span></button><button class="nav-item" data-section="attention"><i data-lucide="triangle-alert"></i><span>Needs Attention</span><em class="danger">3</em></button></nav><div class="sidebar-footer"><button class="nav-item" data-section="settings"><i data-lucide="settings"></i><span>Settings</span></button><button class="nav-item logout" id="logoutBtn"><i data-lucide="log-out"></i><span>Log Out</span></button></div></aside>
<main class="main-content"><header class="topbar"><button class="icon-btn mobile-menu" id="menuBtn" aria-label="Open navigation"><i data-lucide="menu"></i></button><div class="search-box"><i data-lucide="search"></i><input id="globalSearch" type="search" aria-label="Search proposals" placeholder="Search proposals, sites, or locations..."></div><div class="topbar-actions"><button class="icon-btn notification-btn" aria-label="Notifications"><i data-lucide="bell"></i><span></span></button><div class="user-profile"><div class="avatar" id="userInitials">DR</div><div><strong id="userName">Daniel Reyes</strong><span id="userRole">Operations Head</span></div><i data-lucide="chevron-down"></i></div></div></header><section class="page-content" id="pageContent"></section></main></div>
<div class="modal detail-modal" id="proposalModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="proposalTitle"><div class="modal-card"><div class="detail-header"><button class="modal-close" data-close-modal aria-label="Close proposal"><i data-lucide="x"></i></button><p class="eyebrow" id="proposalId">SITE PROPOSAL</p><h2 id="proposalTitle">Proposal review</h2><div id="proposalHeaderMeta"></div></div><div class="detail-body" id="proposalDetail"></div></div></div>
<div class="modal" id="confirmModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirmTitle"><div class="modal-card"><button class="modal-close" data-close-modal aria-label="Close confirmation"><i data-lucide="x"></i></button><div class="modal-icon"><i data-lucide="clipboard-check"></i></div><p class="eyebrow">CONFIRM DECISION</p><h2 id="confirmTitle">Submit decision?</h2><p id="confirmMessage"></p><div class="modal-actions"><button class="secondary-btn" data-close-modal>Cancel</button><button class="primary-btn" id="confirmDecision">Confirm Submission</button></div></div></div>
<div class="toast" id="toast" role="status" aria-live="polite"><i data-lucide="circle-check"></i><span>Changes saved.</span></div><script src="js/dashboard-utils.js"></script><script src="js/department-head-data.js"></script><script src="js/department-head.js"></script></body></html>
