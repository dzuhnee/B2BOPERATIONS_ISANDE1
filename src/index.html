<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5Joys Corporation | Bee-to-Bee Operations</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-container">
    <div class="left-panel">
        <div class="overlay">
           <img src="images/b2blogo.png" alt="Bee-to-Bee Logo" class="logo">
            <h1>Bee-to-Bee Operations</h1>
            <p class="description">
                A Cross-Functional Franchise Launch and Operations Transaction Processing System for
                <strong>5Joys Corporation.</strong>
            </p>
            <div class="features">
                <div class="feature">✓ Smart Site Qualification</div>
                <div class="feature">✓ Approval Workflow</div>
                <div class="feature">✓ Recruitment &amp; Training</div>
                <div class="feature">✓ Store Launch Readiness</div>
                <div class="feature">✓ Operations Monitoring</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your account.</p>

            <form id="loginForm">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="example@5joys.com" required>

                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" required>

                <label for="role">User Role</label>
                <select id="role" required>
                    <option value="">Select your role</option>
                    <option>Executive Management</option>
                    <option>Business Development Officer</option>
                    <option>Department Head</option>
                    <option>HR Specialist</option>
                    <option>Store Trainer</option>
                    <option>Store Manager</option>
                    <option value="Area Manager">Area Manager</option>
                    <option>Supply Chain Officer</option>
                </select>

                <p class="login-message" id="loginMessage" aria-live="polite"></p>
                <button type="submit">LOGIN</button>
            </form>
        </div>
    </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
